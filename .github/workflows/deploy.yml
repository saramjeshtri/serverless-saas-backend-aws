name: Deploy Lambda Functions

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pytest boto3

      - name: Run tests
        run: python3 -m pytest tests/ -v

  deploy:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Zip Lambda functions
        run: |
          cd functions
          zip create_task.zip create_task.py
          zip get_tasks.zip get_tasks.py
          zip get_task.zip get_task.py
          zip update_task.zip update_task.py
          zip delete_task.zip delete_task.py

      - name: Deploy Lambda functions
        run: |
          aws lambda update-function-code --function-name create-task --zip-file fileb://functions/create_task.zip --region us-east-1
          aws lambda update-function-code --function-name get-tasks --zip-file fileb://functions/get_tasks.zip --region us-east-1
          aws lambda update-function-code --function-name get-task --zip-file fileb://functions/get_task.zip --region us-east-1
          aws lambda update-function-code --function-name update-task --zip-file fileb://functions/update_task.zip --region us-east-1
          aws lambda update-function-code --function-name delete-task --zip-file fileb://functions/delete_task.zip --region us-east-1